name: Micro Center Stock Alert

on:
  schedule:
    - cron: '*/5 12-23 * * *'   # every 5 min, 5am-5pm PDT (UTC-7)
    - cron: '*/5 0-5 * * *'     # every 5 min, 5pm-11pm PDT
    - cron: '*/15 6-11 * * *'   # every 15 min, 11pm-5am PDT (nighttime)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python check_stock.py
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
